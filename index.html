<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSVO</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #e9eaec;
      font-family: Arial, sans-serif;
      cursor: none; /* oculta el cursor real fuera del iframe */
    }

    .pagina {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      font-weight: 700;
    }

    .iframe-wrap {
      position: relative;
      width: 750px;
      max-width: 95vw;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.10);
    }

    .iframe-wrap iframe {
      display: block;
      width: 100%;
      height: 440px;
      border: 0;
      background: #fff;
    }

    /* Capa transparente encima del iframe */
.iframe-overlay {
  position: absolute;
  inset: 0;
  z-index: 20;
  background: transparent;
  pointer-events: none; /* deja pasar el mouse */
}
    /* Corazon */
    .cursor-balon {
      position: fixed;
      width: 34px;
      height: 34px;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Opcional: en móvil no mostramos el balón */
    @media (max-width: 768px) {
      .cursor-balon {
        display: none;
      }
      html, body {
        cursor: auto;
      }
    }
  </style>
</head>
<body>
  <div class="pagina">
    <h1>🦁 DSVO</h1>

    <div class="iframe-wrap" id="iframeWrap">
      <iframe
        id="excelFrame"
        width="200"
        height="163"
        frameborder="0"
        scrolling="no"
src="https://1drv.ms/x/c/92eca917b5d15fef/IQTvp-kzCJc0Qqvvo3hXWeiQAVkj0Chkbt7E2pcxM93AFgk?em=2&AllowTyping=True&ActiveCell='Sheet1'!F3&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0">
      </iframe>

      <!-- overlay para que el balón también “se vea dentro” del iframe -->
      <div class="iframe-overlay" id="iframeOverlay" aria-hidden="true"></div>
    </div>
  </div>

  <!-- Balón -->

<img
  id="fakeCursor"
  class="cursor-balon"
  src="https://cdn-icons-png.flaticon.com/512/833/833472.png"
  alt=""
/>

  <script>
    const fakeCursor = document.getElementById("fakeCursor");
    const overlay = document.getElementById("iframeOverlay");

    function moverBalon(x, y) {
      fakeCursor.style.left = x + "px";
      fakeCursor.style.top = y + "px";
    }

    // Movimiento en toda la página
    document.addEventListener("mousemove", (e) => {
      moverBalon(e.clientX, e.clientY);
    });

    // Movimiento sobre el área del iframe
    overlay.addEventListener("mousemove", (e) => {
      moverBalon(e.clientX, e.clientY);
    });

    // Si entras al área del iframe, mantenemos visible el balón
    overlay.addEventListener("mouseenter", (e) => {
      moverBalon(e.clientX, e.clientY);
      fakeCursor.style.display = "block";
    });

    // Clic: soltamos el overlay un instante para permitir interacción simple debajo
    overlay.addEventListener("click", () => {
      overlay.style.pointerEvents = "none";
      setTimeout(() => {
        overlay.style.pointerEvents = "auto";
      }, 120);
    });

    // Opcional: cuando el mouse sale de la ventana, ocultar balón
    document.addEventListener("mouseleave", () => {
      fakeCursor.style.display = "none";
    });

    document.addEventListener("mouseenter", () => {
      fakeCursor.style.display = "block";
    });
  </script>
</body>
</html>
